version: '3.8'

services:
  # 1. TaniVerse Application (Laravel PHP-FPM)
  taniverse_app:
    build: 
      context: ./php
      dockerfile: Dockerfile
    image: taniverse_platform:8.4
    container_name: taniverse_core
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    depends_on:
      taniverse_db:
        condition: service_healthy # Menunggu DB benar-benar siap menerima koneksi
    networks:
      - taniverse_mesh

  # 2. TaniVerse Web Server (Nginx)
  taniverse_web:
    image: nginx:alpine
    container_name: taniverse_nginx
    restart: unless-stopped
    ports:
      - "80:80"   # Akses HTTP
      - "443:443" # Akses HTTPS (Persiapan SSL)
    volumes:
      - ./src:/var/www
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - taniverse_app
    networks:
      - taniverse_mesh

  # 3. TaniVerse Database Engine (PostgreSQL)
  taniverse_db:
    image: postgres:16-alpine
    container_name: taniverse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-taniverse_db}
      POSTGRES_USER: ${DB_USER:-djambred}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-p455w0rd1!.}
    ports:
      - "5432:5432"
    volumes:
      - ./db/postgresql_data:/var/lib/postgresql/data
    healthcheck: # Memastikan container lain tidak connect sebelum DB siap
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-djambred} -d $${POSTGRES_DB:-taniverse_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taniverse_mesh

# Network Definition
networks:
  taniverse_mesh:
    name: taniverse_mesh
    driver: bridge